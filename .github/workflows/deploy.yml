name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      # NEW: Setup Node.js environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Feel free to update this if your service uses a different version

      # NEW: Install dependencies cleanly
      - name: Install dependencies
        run: npm ci

      # NEW: Run tests and generate the coverage report
      - name: Run tests
        run: npm run test

      # Step 2: SonarCloud Scan (Updated to catch the coverage report)
      - name: SonarQube Cloud Scan
        uses: SonarSource/sonarqube-scan-action@a31c9398be7ace6bbfaf30c0bd5d415f843d45e9 # v7.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=ishandilmith
            -Dsonar.projectKey=IshanDilmith_order-microservice
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info

      # Step 3: Login to Azure Container Registry
      - name: Login to ACR
        env:
          ACR_PASSWORD: ${{ secrets.ACR_PASSWORD }}
          ACR_USERNAME: ${{ secrets.ACR_USERNAME }}
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: echo "$ACR_PASSWORD" | docker login "$ACR_LOGIN_SERVER" -u "$ACR_USERNAME" --password-stdin

      # Step 4: Build Order Service Image
      - name: Build Order Service Image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: docker build -t "$ACR_LOGIN_SERVER"/order-service:${{ github.run_number }} .

      # Step 5: Push Order Service Image
      - name: Push Order Service Image
        env:
          ACR_LOGIN_SERVER: ${{ secrets.ACR_LOGIN_SERVER }}
        run: docker push "$ACR_LOGIN_SERVER"/order-service:${{ github.run_number }}