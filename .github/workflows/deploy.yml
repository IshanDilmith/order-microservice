name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # FIX 1: Updated to v4 and added fetch-depth for SonarCloud
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # FIX 2: Updated to @master and removed the 'with' block (it reads from sonar-project.properties now)
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      # FIX 3: Added Azure Login so the final deployment step knows who you are
      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/order-microservice:v1 .

      - name: Push to ACR
        run: |
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/order-microservice:v1

      - name: Deploy to Azure Container Apps
        run: |
          az containerapp update \
            --name order-microservice-app \
            --resource-group CTSE \
            --image ${{ secrets.ACR_LOGIN_SERVER }}/order-microservice:v1